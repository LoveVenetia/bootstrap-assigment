<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JSON-tehtävä</title>
</head>
<body>

  <h1>JSON-tehtävä</h1>

  <h2>Tehtävät</h2>
<ul>
  <li><a href="index.html">Tehtävä 1 – JSON</a></li>
  <li><a href="toteutus.html">Tehtävä 1 – Toteutus</a></li>
  <li><a href="poke.html">Tehtävä 2 – Poke Haku</a></li>
  <li><a href="saa.html">Tehtävä 3 – Sää</a></li>
</ul>
<hr>

  <div id="vastaus"></div>

  <script>
    fetch("tietue.json")
      .then(function (response) {
        return response.json();
      })
      .then(function (responseJson) {
        kerro(responseJson);
      })
      .catch(function (error) {
        document.getElementById("vastaus").innerHTML =
          "<p>Tietoa ei pystytä hakemaan</p>";
      });

    function kerro(obj) {

      let tiedot = "<h2>" + obj.otsikko + "</h2><br>"
        + obj.kuvaus + "<br><hr>";

      tiedot += "<p><img src='" + obj.kuva + "' width='300' alt='Kuva'></p>";

      tiedot += "<h3>Opintojakso</h3>";
      tiedot += "Nimi: " + obj.opintojakso.nimi + "<br>";
      tiedot += "Tunnus: " + obj.opintojakso.tunnus + "<br>";
      tiedot += "Opintopisteet: " + obj.opintojakso.opintopisteet + "<br>";

      tiedot += "<h3>Sisältö</h3><ul>";
      for (var j = 0; j < obj.opintojakso.sisalto.length; j++) {
        tiedot += "<li>" + obj.opintojakso.sisalto[j] + "</li>";
      }
      tiedot += "</ul><hr>";

      tiedot += "<h3>Tekniikat</h3>";

      for (var i = 0; i < obj.tekniikat.length; i++) {
        tiedot += "<b>Aihe: " + obj.tekniikat[i].aihe + "</b> ";
        tiedot += "<a href='" + obj.tekniikat[i].linkki + "' target='_blank'>";
        tiedot += obj.tekniikat[i].linkki + "</a><br>";
      }

      document.getElementById("vastaus").innerHTML = tiedot;
    }
  </script>

</body>
</html>
