<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poke Haku</title>
</head>
<body>

<h1>Pokemon haku</h1>

<input type="text" id="pokemonName" placeholder="Enter Pokemon name">
<button onclick="poke()">Hae</button>

<h2 id="nimi"></h2>
<div id="kuva2"></div>
<div id="kaannaAlue"></div>
<div id="ominaisuudet"></div>
<div id="vastaus"></div>

<script>

let lastData = null;
let isBack = false;

function poke() {

  const pokeName = document.getElementById("pokemonName").value.toLowerCase().trim();

  document.getElementById("nimi").innerHTML = "";
  document.getElementById("kuva2").innerHTML = "";
  document.getElementById("kaannaAlue").innerHTML = "";
  document.getElementById("ominaisuudet").innerHTML = "";
  document.getElementById("vastaus").innerHTML = "";

  if (!pokeName) {
    document.getElementById("vastaus").innerHTML = "Kirjoita Pokemonin nimi";
    return;
  }

  fetch("https://pokeapi.co/api/v2/pokemon/" + pokeName)
    .then(function(response) {
      if (!response.ok) {
        throw new Error("Not found");
      }
      return response.json();
    })
    .then(function(data) {
      lastData = data;
      isBack = false;
      naytaFront(data);
    })
    .catch(function() {
      lastData = null;
      document.getElementById("vastaus").innerHTML = "Pokemon ei löytynyt";
    });

  document.getElementById("pokemonName").value = "";
}

function naytaFront(obj) {

  document.getElementById("nimi").innerHTML = obj.name;
  document.getElementById("kuva2").innerHTML =
    "<img src='" + obj.sprites.front_default + "' alt='pokemon'>";
  
  document.getElementById("kaannaAlue").innerHTML =
    "<button onclick='kaanna()'>Käännä</button>";
}

function kaanna() {

  if (!lastData) {
    document.getElementById("vastaus").innerHTML = "Tietoa ei pystytä hakemaan";
    return;
  }

  const front = lastData.sprites.front_default;
  const back = lastData.sprites.back_default;

  isBack = !isBack;

  const kuva = isBack ? back : front;

  if (!kuva) {
    document.getElementById("vastaus").innerHTML = "Kuvaa ei löytynyt";
    isBack = !isBack;
    return;
  }

  document.getElementById("kuva2").innerHTML =
    "<img src='" + kuva + "' alt='pokemon'>";

  let types = "";
  for (var i = 0; i < lastData.types.length; i++) {
    types += lastData.types[i].type.name;
    if (i < lastData.types.length - 1) types += ", ";
  }

  let html = "<h3>Ominaisuudet</h3>";
  html += "<p>Tyyppi: " + types + "</p>";
  html += "<p>Pituus: " + lastData.height + "</p>";
  html += "<p>Paino: " + lastData.weight + "</p>";
  html += "<p>Base experience: " + lastData.base_experience + "</p>";

  document.getElementById("ominaisuudet").innerHTML = html;
}

</script>

</body>
</html>
